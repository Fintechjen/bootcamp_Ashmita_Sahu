name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python - <<'PY'
import pandas as pd; import numpy as np
print('Pandas', pd.__version__, 'NumPy', np.__version__)
PY
